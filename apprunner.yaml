version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip3 install -r requirements.txt
run:
  pre-run:
    - pip3 install -r requirements.txt
  command: python3 -m streamlit run dashboard/app.py --server.port 8080 --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false --server.enableWebsocketCompression false --server.enableCORS false --server.enableXsrfProtection false
  network:
    port: 8080
